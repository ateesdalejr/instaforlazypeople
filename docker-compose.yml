version: '3.8'

services:
  polisher:
    build:
      context: ./polisher
      dockerfile: Dockerfile
    container_name: polisher-service
    environment:
      - SERVICE_NAME=polisher
    ports:
      - "8001:8000"
    volumes:
      - ./polisher:/app
    networks:
      - microservices-network
    restart: unless-stopped

  get-video:
    build:
      context: ./get-video
      dockerfile: Dockerfile
    container_name: get-video-service
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GMI_API_KEY=${GMI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OUTPUT_DIR=${OUTPUT_DIR}
    ports:
      - "8002:8000"
    volumes:
      - ./get-video:/app
    networks:
      - microservices-network
    restart: unless-stopped

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator-service
    environment:
      - GET_VIDEO_URL=http://get-video:8000
      - POLISHER_URL=http://polisher:8000
      - BUFFER_URL=http://buffer:8000
      - BUFFER_PROFILE_IDS=${BUFFER_PROFILE_IDS}
      - TARGET_AUDIENCE=${TARGET_AUDIENCE:-general audience}
      - CAPTION_TONE=${CAPTION_TONE:-engaging}
      - SERVICE_TIMEOUT=${SERVICE_TIMEOUT:-300}
    ports:
      - "8000:8000"
    depends_on:
      - get-video
      - polisher
      - buffer
    networks:
      - microservices-network
    restart: unless-stopped

  buffer:
    build:
      context: ./buffer
      dockerfile: Dockerfile
    container_name: buffer-service
    environment:
      - BUFFER_API_KEY=${BUFFER_API_KEY}
      - BUFFER_CHANNEL_ID=${BUFFER_CHANNEL_ID}
    ports:
      - "8003:8000"
    volumes:
      - ./buffer:/app
    networks:
      - microservices-network
    restart: unless-stopped

  video_gen:
    build:
      context: ./video_gen
      dockerfile: Dockerfile
    container_name: video-gen-service
    environment:
      - SERVICE_NAME=video_gen
      - GMI_API_KEY=${GMI_API_KEY}
    ports:
      - "8004:8000"
    volumes:
      - ./video_gen:/app
    networks:
      - microservices-network
    restart: unless-stopped

networks:
  microservices-network:
    driver: bridge
