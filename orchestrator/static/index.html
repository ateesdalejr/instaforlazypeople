<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #18181b;
    --surface: #27272a;
    --surface-2: #3f3f46;
    --border: #3f3f46;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --accent-1: #8b5cf6;
    --accent-2: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,.35);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    padding: 0 16px 64px;
  }

  /* ---- header ---- */
  header {
    text-align: center;
    padding: 48px 0 24px;
  }
  header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    color: var(--text-muted);
    font-size: 1.05rem;
    margin-top: 6px;
    letter-spacing: .5px;
  }

  /* ---- layout ---- */
  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  /* ---- card ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    transition: border-color .25s;
  }
  .card:hover { border-color: #52525b; }

  .card-title {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-1);
    display: inline-block;
  }

  /* ---- controls ---- */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: .8rem; color: var(--text-muted); font-weight: 500; }
  .field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: .95rem;
    width: 120px;
    transition: border-color .2s;
  }
  .field input:focus { outline: none; border-color: var(--accent-1); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, opacity .2s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    box-shadow: 0 2px 12px rgba(139,92,246,.35);
  }
  .btn-secondary {
    background: var(--surface-2);
    color: var(--text);
  }

  /* ---- spinner ---- */
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .spinner { display: inline-block; }

  /* ---- pipeline viz ---- */
  .pipeline {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 28px 0 12px;
    flex-wrap: wrap;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-radius: 999px;
    font-weight: 600;
    font-size: .88rem;
    background: var(--surface);
    border: 2px solid var(--border);
    transition: border-color .4s, background .4s, box-shadow .4s;
    white-space: nowrap;
  }
  .step .icon { font-size: 1.1rem; }
  .step.success {
    border-color: var(--green);
    background: rgba(34,197,94,.1);
    box-shadow: 0 0 16px rgba(34,197,94,.2);
  }
  .step.failure {
    border-color: var(--red);
    background: rgba(239,68,68,.1);
    box-shadow: 0 0 16px rgba(239,68,68,.2);
  }
  .step.running {
    border-color: var(--yellow);
    background: rgba(234,179,8,.08);
    animation: pulse-border 1.2s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 8px rgba(234,179,8,.15); }
    50% { box-shadow: 0 0 20px rgba(234,179,8,.35); }
  }

  .arrow {
    color: var(--text-muted);
    font-size: 1.3rem;
    padding: 0 6px;
    transition: color .3s;
  }

  /* ---- error banner ---- */
  .error-banner {
    background: rgba(239,68,68,.12);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: #fca5a5;
    margin-bottom: 20px;
    display: none;
    animation: fadeIn .3s;
  }
  .error-banner.visible { display: block; }
  .error-banner strong { color: var(--red); }

  /* ---- results ---- */
  #results { display: none; animation: fadeIn .4s; }
  #results.visible { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* collapsible */
  .collapsible-header {
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .collapsible-header .chevron {
    transition: transform .25s;
    font-size: 1.1rem;
    color: var(--text-muted);
  }
  .collapsible-header.open .chevron { transform: rotate(180deg); }
  .collapsible-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }
  .collapsible-body.open { max-height: 2000px; }
  .collapsible-body-inner { padding-top: 16px; }

  /* result details */
  .scene {
    background: var(--bg);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .scene-num {
    font-weight: 600;
    font-size: .78rem;
    color: var(--accent-1);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 4px;
  }
  .scene-desc { color: var(--text-muted); font-size: .92rem; }

  .clip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .clip-label { font-weight: 500; font-size: .92rem; }
  .clip-status {
    font-size: .8rem;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
  }
  .clip-status.ok { background: rgba(34,197,94,.15); color: var(--green); }
  .clip-status.fail { background: rgba(239,68,68,.15); color: var(--red); }

  a { color: var(--accent-2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .caption-block {
    background: var(--bg);
    border-radius: 8px;
    padding: 16px 20px;
    font-size: .95rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .meta-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .82rem;
  }
  .meta-item .mk { color: var(--text-muted); }
  .meta-item .mv { font-family: 'JetBrains Mono', monospace; color: var(--text); }

  .json-block {
    background: var(--bg);
    border-radius: 8px;
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-muted);
    max-height: 300px;
    overflow-y: auto;
  }

  .summary-text {
    color: var(--text-muted);
    font-size: .92rem;
    margin-bottom: 16px;
  }

  /* responsive */
  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .controls { flex-direction: column; align-items: stretch; }
    .field input { width: 100%; }
    .btn { width: 100%; justify-content: center; }
    .pipeline { flex-direction: column; gap: 4px; }
    .arrow { transform: rotate(90deg); }
    .step { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<header>
  <h1>Insta Pipeline</h1>
  <p>Video &rarr; Polish &rarr; Post</p>
</header>

<div class="container">
  <!-- Controls -->
  <div class="card">
    <div class="card-title"><span class="dot"></span> Pipeline Controls</div>
    <div class="controls">
      <div class="field">
        <label for="days">Days back</label>
        <input type="number" id="days" value="1" min="1">
      </div>
      <div class="field">
        <label for="maxResults">Max results</label>
        <input type="number" id="maxResults" value="5" min="1">
      </div>
      <button class="btn btn-primary" id="btnRun" onclick="runPipeline()">
        <span class="spinner" id="spinRun"></span>
        Run Pipeline
      </button>
      <button class="btn btn-secondary" id="btnMock" onclick="runMock()">
        <span class="spinner" id="spinMock"></span>
        Run Mock
      </button>
    </div>
  </div>

  <!-- Pipeline Viz -->
  <div class="pipeline">
    <div class="step" id="step-get-video"><span class="icon">1</span> Get Video</div>
    <span class="arrow">&rarr;</span>
    <div class="step" id="step-polisher"><span class="icon">2</span> Polisher</div>
    <span class="arrow">&rarr;</span>
    <div class="step" id="step-buffer"><span class="icon">3</span> Buffer</div>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="errorBanner"><strong>Error: </strong><span id="errorText"></span></div>

  <!-- Results -->
  <div id="results">
    <!-- Storyboard -->
    <div class="card" id="card-storyboard">
      <div class="collapsible-header open" onclick="toggleCollapse(this)">
        <div class="card-title"><span class="dot"></span> Storyboard</div>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="collapsible-body open">
        <div class="collapsible-body-inner" id="storyboardContent"></div>
      </div>
    </div>

    <!-- Clips -->
    <div class="card" id="card-clips">
      <div class="collapsible-header open" onclick="toggleCollapse(this)">
        <div class="card-title"><span class="dot"></span> Video Clips</div>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="collapsible-body open">
        <div class="collapsible-body-inner" id="clipsContent"></div>
      </div>
    </div>

    <!-- Caption -->
    <div class="card" id="card-caption">
      <div class="collapsible-header open" onclick="toggleCollapse(this)">
        <div class="card-title"><span class="dot"></span> Caption</div>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="collapsible-body open">
        <div class="collapsible-body-inner" id="captionContent"></div>
      </div>
    </div>

    <!-- Buffer -->
    <div class="card" id="card-buffer">
      <div class="collapsible-header open" onclick="toggleCollapse(this)">
        <div class="card-title"><span class="dot"></span> Buffer Response</div>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="collapsible-body open">
        <div class="collapsible-body-inner" id="bufferContent"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const STEP_IDS = ['get-video', 'polisher', 'buffer'];

  function resetUI() {
    STEP_IDS.forEach(s => {
      const el = document.getElementById('step-' + s);
      el.className = 'step';
    });
    document.getElementById('errorBanner').classList.remove('visible');
    document.getElementById('results').classList.remove('visible');
    ['storyboardContent','clipsContent','captionContent','bufferContent'].forEach(id => {
      document.getElementById(id).innerHTML = '';
    });
  }

  function setLoading(btn, spin, on) {
    btn.disabled = on;
    document.getElementById('btnRun').disabled = on;
    document.getElementById('btnMock').disabled = on;
    spin.style.display = on ? 'inline-block' : 'none';
  }

  function showError(msg) {
    const b = document.getElementById('errorBanner');
    document.getElementById('errorText').textContent = msg;
    b.classList.add('visible');
  }

  function toggleCollapse(header) {
    header.classList.toggle('open');
    header.nextElementSibling.classList.toggle('open');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  async function animateSteps(steps) {
    for (let i = 0; i < steps.length; i++) {
      const s = steps[i];
      const el = document.getElementById('step-' + s.step);
      if (!el) continue;
      el.classList.add('running');
      await new Promise(r => setTimeout(r, 400));
      el.classList.remove('running');
      el.classList.add(s.success ? 'success' : 'failure');
      await new Promise(r => setTimeout(r, 200));
    }
  }

  function renderStoryboard(video) {
    if (!video || !video.storyboard) return;
    const sb = video.storyboard;
    let html = `<h3 style="font-size:1.05rem;margin-bottom:4px;">${esc(sb.title)}</h3>`;
    html += `<p class="summary-text">${esc(sb.summary)}</p>`;
    sb.scenes.forEach(sc => {
      html += `<div class="scene">
        <div class="scene-num">Scene ${sc.scene_number}</div>
        <div class="scene-desc">${esc(sc.description)}</div>
      </div>`;
    });
    document.getElementById('storyboardContent').innerHTML = html;
  }

  function renderClips(video) {
    if (!video || !video.clips || !video.clips.length) {
      document.getElementById('clipsContent').innerHTML = '<p class="summary-text">No clips available.</p>';
      return;
    }
    let html = '';
    video.clips.forEach(c => {
      const ok = c.status === 'completed' || c.status === 'success';
      html += `<div class="clip">
        <div>
          <span class="clip-label">Scene ${c.scene_number}</span>
          ${c.video_url ? ` &mdash; <a href="${esc(c.video_url)}" target="_blank">View video</a>` : ''}
        </div>
        <span class="clip-status ${ok ? 'ok' : 'fail'}">${esc(c.status)}</span>
      </div>`;
      if (c.error) {
        html += `<div style="color:var(--red);font-size:.85rem;padding:0 16px 8px;">${esc(c.error)}</div>`;
      }
    });
    document.getElementById('clipsContent').innerHTML = html;
  }

  function renderCaption(caption) {
    if (!caption) {
      document.getElementById('captionContent').innerHTML = '<p class="summary-text">No caption generated.</p>';
      return;
    }
    let html = `<div class="caption-block">${esc(caption.caption)}</div>`;
    if (caption.metadata && Object.keys(caption.metadata).length) {
      html += '<div class="meta-grid">';
      for (const [k,v] of Object.entries(caption.metadata)) {
        html += `<div class="meta-item"><span class="mk">${esc(k)}</span><br><span class="mv">${esc(String(v))}</span></div>`;
      }
      html += '</div>';
    }
    if (caption.error_message) {
      html += `<p style="color:var(--red);margin-top:12px;font-size:.9rem;">${esc(caption.error_message)}</p>`;
    }
    document.getElementById('captionContent').innerHTML = html;
  }

  function renderBuffer(buf) {
    if (!buf) {
      document.getElementById('bufferContent').innerHTML = '<p class="summary-text">No buffer response.</p>';
      return;
    }
    document.getElementById('bufferContent').innerHTML = `<div class="json-block">${esc(JSON.stringify(buf, null, 2))}</div>`;
  }

  function handleResponse(data) {
    // Show step errors inline
    (data.steps || []).forEach(s => {
      if (!s.success && s.error) {
        const el = document.getElementById('step-' + s.step);
        if (el) el.title = s.error;
      }
    });

    if (!data.success) {
      const failedStep = (data.steps || []).find(s => !s.success);
      showError(failedStep ? `${failedStep.step}: ${failedStep.error}` : 'Pipeline failed.');
    }

    renderStoryboard(data.video);
    renderClips(data.video);
    renderCaption(data.caption);
    renderBuffer(data.buffer_response);
    document.getElementById('results').classList.add('visible');
  }

  async function runPipeline() {
    resetUI();
    const btn = document.getElementById('btnRun');
    const spin = document.getElementById('spinRun');
    setLoading(btn, spin, true);

    const days = document.getElementById('days').value || 1;
    const max = document.getElementById('maxResults').value || 20;

    // Set steps to running sequentially (visual only)
    STEP_IDS.forEach(s => document.getElementById('step-' + s).classList.add('running'));

    try {
      const resp = await fetch(`/run?days=${days}&max_results=${max}`, { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
      const data = await resp.json();

      // Animate steps from running to final state
      STEP_IDS.forEach(s => document.getElementById('step-' + s).className = 'step');
      await animateSteps(data.steps || []);
      handleResponse(data);
    } catch (e) {
      STEP_IDS.forEach(s => document.getElementById('step-' + s).className = 'step');
      showError(e.message);
    } finally {
      setLoading(btn, spin, false);
    }
  }

  async function runMock() {
    resetUI();
    const btn = document.getElementById('btnMock');
    const spin = document.getElementById('spinMock');
    setLoading(btn, spin, true);

    STEP_IDS.forEach(s => document.getElementById('step-' + s).classList.add('running'));

    try {
      const resp = await fetch('/run/mock');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
      const data = await resp.json();

      STEP_IDS.forEach(s => document.getElementById('step-' + s).className = 'step');
      await animateSteps(data.steps || []);
      handleResponse(data);
    } catch (e) {
      STEP_IDS.forEach(s => document.getElementById('step-' + s).className = 'step');
      showError(e.message);
    } finally {
      setLoading(btn, spin, false);
    }
  }
</script>
</body>
</html>
